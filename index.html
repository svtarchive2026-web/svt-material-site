<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEVENTEEN 物料站</title>
<style>
body{font-family:sans-serif;margin:0;background:#ffe6ef}
header{background:linear-gradient(90deg,#ffd1dc,#c7d9ff);padding:20px;text-align:center;font-size:24px;font-weight:bold;color:white}
.container{padding:15px}
.card{background:white;border-radius:16px;padding:15px;margin-bottom:15px}
.debug{color:red}
</style>
</head>
<body>

<header>💎 SEVENTEEN 物料收藏 💎</header>
<div class="container" id="app">載入中...</div>

<script>
const sheetURL = "https://opensheet.elk.sh/1zJCoiziDA26ofbB5PSRHOlbO_v-EfZ8mYXiHpGdy9Z4/工作表1";

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
  const app = document.getElementById("app");
  app.innerHTML = "";

  if(!data.length){
    app.innerHTML = "<p class='debug'>⚠️ 有抓到資料但內容是空的</p>";
    return;
  }

  data.forEach(item=>{
    const div = document.createElement("div");
    div.className="card";

    div.innerHTML = `
      <h3>${item.標題 || "（沒有標題）"}</h3>
      <p>${item.成員 || ""}</p>
    `;

    app.appendChild(div);
  });

})
.catch(()=>{
  document.getElementById("app").innerHTML = "<p class='debug'>❌ 讀取失敗</p>";
});
</script>

</body>
</html>
