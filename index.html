<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEVENTEEN 物料站</title>
<style>
body{font-family:sans-serif;margin:0;background:#ffe6ef}
header{background:linear-gradient(90deg,#ffd1dc,#c7d9ff);padding:20px;text-align:center;font-size:24px;font-weight:bold;color:white}
.container{padding:15px}
.card{background:white;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
img{width:100%;border-radius:10px;margin-top:10px}
iframe{width:100%;height:220px;border:none;border-radius:10px;margin-top:10px}
.tag{display:inline-block;background:#ffd6eb;padding:5px 10px;border-radius:10px;margin:3px;font-size:12px}
.member{font-weight:bold;color:#ff6fa5}
.duration{color:#888;font-size:14px}
.link{font-size:14px;margin-top:5px}
</style>
</head>
<body>
<header>💎 SEVENTEEN 物料收藏 💎</header>
<div class="container" id="app">載入中...</div>

<script>
const sheetURL = "https://opensheet.elk.sh/1zJCoiziDA26ofbB5PSRHOlbO_v-EfZ8mYXiHpGdy9Z4/工作表1";

async function loadData(){
  try{
    const res = await fetch(sheetURL);
    const data = await res.json();
    render(data);
  }catch(e){
    document.getElementById('app').innerHTML = "❌ 資料讀取失敗";
  }
}

function render(data){
  const app = document.getElementById('app');
  app.innerHTML = "";

  data.reverse().forEach(item=>{
    const card = document.createElement('div');
    card.className = 'card';

    let html = `<h3>${item.標題 || ""}</h3>`;
    html += `<p class="member">${item.成員 || ""}</p>`;

    if(item.主影片){
      let videoUrl = item.主影片;
      if(videoUrl.includes("youtube.com/watch")){
        const id = videoUrl.split("v=")[1];
        videoUrl = `https://www.youtube.com/embed/${id}`;
      }
      html += `<iframe src="${videoUrl}"></iframe>`;
    }

    if(item.直播時長){
      html += `<p class="duration">⏱ ${item.直播時長}</p>`;
    }

    if(item.圖片){
      const imgs = item.圖片.split(',');
      imgs.forEach(img=>{
        if(img.trim()){
          html += `<img src="${img.trim()}"/>`;
        }
      });
    }

    if(item.標籤){
      const tags = item.標籤.split(',');
      tags.forEach(tag=>{
        if(tag.trim()){
          html += `<span class="tag">${tag}</span>`;
        }
      });
    }

    const links = [
      {name:"Weverse",url:item.Weverse網址},
      {name:"IG",url:item.Instagram網址},
      {name:"X",url:item.Twitter網址},
      {name:"YouTube",url:item.YouTube網址}
    ];

    links.forEach(link=>{
      if(link.url){
        html += `<div class="link"><a href="${link.url}" target="_blank">${link.name}</a></div>`;
      }
    });

    card.innerHTML = html;
    app.appendChild(card);
  });
}

loadData();
</script>
</body>
</html>
