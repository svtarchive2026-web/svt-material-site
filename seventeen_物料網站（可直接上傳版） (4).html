<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEVENTEEN 物料站</title>

<style>
body{font-family:sans-serif;margin:0;background:#ffe6ef}
header{background:linear-gradient(90deg,#ffd1dc,#c7d9ff);padding:20px;text-align:center;font-size:24px;font-weight:bold;color:white}
.container{padding:15px}
.card{background:white;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
img{width:100%;border-radius:10px;margin-top:10px}
iframe{width:100%;height:220px;border:none;border-radius:10px;margin-top:10px}
.tag{display:inline-block;background:#ffd6eb;padding:5px 10px;border-radius:10px;margin:3px;font-size:12px}
.member{font-weight:bold;color:#ff6fa5}
.duration{color:#888;font-size:14px}
.link{font-size:14px;margin-top:5px}
.section-title{margin-top:10px;font-weight:bold}
</style>

</head>
<body>

<header>💎 SEVENTEEN 物料收藏 💎</header>
<div class="container" id="app">載入中...</div>

<script>
const sheetURL = "https://opensheet.elk.sh/1zJCoiziDA26ofbB5PSRHOlbO_v-EfZ8mYXiHpGdy9Z4/工作表1";

function splitLines(text){
  if(!text) return [];
  return String(text).split(/\n|,/).map(t=>t.trim()).filter(Boolean);
}

function convertDrive(url){
  if(url.includes("drive.google.com")){
    const id = url.match(/[-\w]{25,}/);
    if(id){
      return "https://drive.google.com/uc?export=view&id=" + id[0];
    }
  }
  return url;
}

function createLinks(title, value){
  const links = splitLines(value);
  if(!links.length) return "";
  
  let html = `<div class="section-title">${title}</div>`;
  links.forEach(l=>{
    html += `<div class="link"><a href="${l}" target="_blank">${l}</a></div>`;
  });
  return html;
}

function createImages(value){
  const imgs = splitLines(value);
  let html = "";
  imgs.forEach(img=>{
    const url = convertDrive(img);
    html += `<img src="${url}" onerror="this.style.display='none'"/>`;
  });
  return html;
}

function createTags(value){
  const tags = splitLines(value);
  let html = "";
  tags.forEach(t=>{
    html += `<span class="tag">${t}</span>`;
  });
  return html;
}

function createYouTube(url){
  if(!url) return "";
  if(!url.includes("youtube")) return "";

  let id = "";
  if(url.includes("watch")){
    id = url.split("v=")[1]?.split("&")[0];
  }else if(url.includes("youtu.be")){
    id = url.split("/").pop();
  }

  if(!id) return "";
  return `<iframe src="https://www.youtube.com/embed/${id}"></iframe>`;
}

fetch(sheetURL)
.then(res=>res.json())
.then(data=>{
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.reverse().forEach(item=>{
    const card = document.createElement("div");
    card.className = "card";

    let html = "";

    if(item.標題) html += `<h3>${item.標題}</h3>`;
    if(item.成員) html += `<div class="member">${item.成員}</div>`;
    if(item.直播時長) html += `<div class="duration">⏱ ${item.直播時長}</div>`;

    html += createYouTube(item.主影片);
    html += createImages(item.圖片);
    html += createTags(item.標籤);

    html += createLinks("Weverse", item.Weverse網址);
    html += createLinks("Instagram", item.Instagram網址);
    html += createLinks("Twitter", item.Twitter網址);
    html += createLinks("TikTok", item.TikTok網址);
    html += createLinks("抖音", item.抖音網址);
    html += createLinks("微博", item.微博網址);
    html += createLinks("小紅書", item.小紅書網址);
    html += createLinks("YouTube", item.YouTube網址);
    html += createLinks("其他", item.其他網址);

    if(html.trim() === "") return;

    card.innerHTML = html;
    app.appendChild(card);
  });

})
.catch(()=>{
  document.getElementById("app").innerHTML = "❌ 無法讀取資料（請確認試算表公開）";
});
</script>

</body>
</html>
